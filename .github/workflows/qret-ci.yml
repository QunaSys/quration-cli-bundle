name: qret-ci

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-qret:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            asset_suffix: macos-15-intel
            archive_ext: tar.gz
          - os: macos-latest
            asset_suffix: macos-latest
            archive_ext: tar.gz
          - os: ubuntu-latest
            asset_suffix: ubuntu-latest
            archive_ext: tar.gz
          - os: windows-latest
            asset_suffix: windows-latest
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure vcpkg toolchain
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/.vcpkg"
          echo "VCPKG_ROOT=${{ github.workspace }}/.vcpkg" >> "$GITHUB_ENV"
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/.vcpkg"

      - name: Install libyaml-cpp (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libyaml-cpp0.8 libyaml-cpp-dev

      - name: Set compiler env (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "CC=gcc" >> "$GITHUB_ENV"
          echo "CXX=g++" >> "$GITHUB_ENV"

      - name: Install libyaml-cpp (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install yaml-cpp

      - name: Configure Homebrew lib path (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew_prefix=$(brew --prefix yaml-cpp)
          if [ -n "$brew_prefix" ]; then
            echo "DYLD_LIBRARY_PATH=$brew_prefix/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Set compiler env (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          cmake -S quration -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

      - name: Build qret
        run: cmake --build build --config Release --target qret

      - name: Install to stage
        run: cmake --install build --config Release --prefix stage

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist package
          root="qret-${{ matrix.asset_suffix }}"
          mkdir -p "package/$root"
          cp -R stage/. "package/$root/"
          tar -C package -czf "dist/$root.${{ matrix.archive_ext }}" "$root"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path package | Out-Null
          $root = "qret-${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force -Path "package/$root" | Out-Null
          Copy-Item -Recurse -Force stage\* "package/$root/"
          Compress-Archive -Path "package/$root" -DestinationPath "dist/$root.${{ matrix.archive_ext }}" -Force

      - name: Upload qret artifact
        uses: actions/upload-artifact@v4
        with:
          name: qret-${{ matrix.asset_suffix }}
          path: dist/qret-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}

  release:
    if: github.event_name == 'release'
    needs: [build-qret]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all qret artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: qret-*
          merge-multiple: true

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
