name: qret-ci

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-qret:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            asset_suffix: macos-15-intel
            release_name: qret-macos-15-intel
            vcpkg_triplet: x64-osx-static
          - os: macos-latest
            asset_suffix: macos-latest
            release_name: qret-macos-latest
            vcpkg_triplet: arm64-osx-static
          - os: ubuntu-latest
            asset_suffix: ubuntu-latest
            release_name: qret-ubuntu-latest
            vcpkg_triplet: x64-linux-static
          - os: windows-latest
            asset_suffix: windows-latest
            release_name: qret-windows-latest.exe
            vcpkg_triplet: x64-windows-static

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure vcpkg toolchain
        shell: bash
        run: |
          mkdir -p "${{ github.workspace }}/.vcpkg"
          echo "VCPKG_ROOT=${{ github.workspace }}/.vcpkg" >> "$GITHUB_ENV"
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}/.vcpkg"

      - name: Install libyaml-cpp (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libyaml-cpp0.8 libyaml-cpp-dev

      - name: Set compiler env (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "CC=gcc" >> "$GITHUB_ENV"
          echo "CXX=g++" >> "$GITHUB_ENV"

      - name: Install libyaml-cpp (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install yaml-cpp

      - name: Configure Homebrew lib path (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew_prefix=$(brew --prefix yaml-cpp)
          if [ -n "$brew_prefix" ]; then
            echo "DYLD_LIBRARY_PATH=$brew_prefix/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Set compiler env (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          cmake -S quration -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.vcpkg_triplet }}" \
            -DVCPKG_OVERLAY_TRIPLETS="${{ github.workspace }}/.github/vcpkg-triplets" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build qret
        run: cmake --build build --config Release --target qret

      - name: Verify static link (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eux
          qret_bin="$(find build -type f -name qret | head -n 1)"
          test -n "$qret_bin"
          if [ "${{ runner.os }}" = "Linux" ]; then
            ldd "$qret_bin" > /tmp/qret-ldd.txt
            ! grep -E "qret-core|yaml-cpp|boost_program_options" /tmp/qret-ldd.txt
          else
            otool -L "$qret_bin" > /tmp/qret-otool.txt
            ! grep -E "qret-core|yaml-cpp|boost_program_options" /tmp/qret-otool.txt
          fi

      - name: Verify static link (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $qret = Get-ChildItem -Path build -Recurse -Filter qret.exe | Select-Object -First 1
          if (-not $qret) { throw "qret.exe not found" }
          $dump = & dumpbin /DEPENDENTS $qret.FullName
          if ($dump -match "qret-core|yaml-cpp|boost_program_options") {
            throw "Found unexpected shared dependency in qret.exe"
          }

      - name: Collect qret binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eux
          mkdir -p dist
          qret_bin="$(find build -type f -name qret | head -n 1)"
          test -n "$qret_bin"
          cp "$qret_bin" "dist/${{ matrix.release_name }}"

      - name: Collect qret binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $qret = Get-ChildItem -Path build -Recurse -Filter qret.exe | Select-Object -First 1
          if (-not $qret) { throw "qret.exe not found" }
          Copy-Item -Force $qret.FullName "dist/${{ matrix.release_name }}"

      - name: Upload qret artifact
        uses: actions/upload-artifact@v4
        with:
          name: qret-${{ matrix.asset_suffix }}
          path: dist/${{ matrix.release_name }}

  release:
    if: github.event_name == 'release'
    needs: [build-qret]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all qret artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: qret-*
          merge-multiple: true

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
