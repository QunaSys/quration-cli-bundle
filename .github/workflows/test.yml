name: test

on:
  push:
    branches: [main]
    paths:
      - "qret_cli_bundle/**"
      - tests/**
      - pyproject.toml
      - .github/workflows/test.yml
  pull_request:
    paths:
      - "qret_cli_bundle/**"
      - tests/**
      - pyproject.toml
      - .github/workflows/test.yml

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - macos-15-intel
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Prepare qret stub for test (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p .ci-bin
          cat > .ci-bin/qret <<'EOF'
          #!/usr/bin/env sh
          echo "qret 0.0.0-ci"
          EOF
          cat > .ci-bin/gridsynth <<'EOF'
          #!/usr/bin/env sh
          echo "gridsynth 0.0.0-ci"
          EOF
          chmod +x .ci-bin/qret
          chmod +x .ci-bin/gridsynth
          echo "$GITHUB_WORKSPACE/.ci-bin" >> "$GITHUB_PATH"

      - name: Prepare qret stub for test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci-bin | Out-Null
          @'
          @echo off
          echo qret 0.0.0-ci
          '@ | Set-Content -Path .ci-bin/qret.cmd
          @'
          @echo off
          echo gridsynth 0.0.0-ci
          '@ | Set-Content -Path .ci-bin/gridsynth.cmd
          "$env:GITHUB_WORKSPACE/.ci-bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Run pytest
        run: pytest -q tests/test_qret_cli_bundle.py
